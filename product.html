<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="//firestore.googleapis.com">
    <link rel="dns-prefetch" href="//www.gstatic.com">
    
    <title>Cloisonne Enamel Jewelry</title>
    <meta name="description" content="Handmade cloisonne enamel jewelry by Nino Kartsivadze from Tbilisi.">
    
    <meta property="og:title" content="Cloisonne Enamel Jewelry" />
    <meta property="og:type" content="product" />
    <meta property="og:description" content="Handmade cloisonne enamel jewelry by Nino Kartsivadze from Tbilisi." />
    <meta property="og:image" content="https://minankari.art/placeholder.jpg" />
    <meta property="og:url" content="https://minankari.art/" />
    <meta property="og:site_name" content="CLOISONNE ENAMEL | Nino Kartsivadze" />
    
    <script>
        (function earlySeoBootstrap() {
            try {
                var API_KEY = "AIzaSyAxOUOxaufE60eVuyOq_P66MJ9ls_7p470";
                var PROJECT_ID = "nini-shop-7c89d";
                var pathParts = location.pathname.split('/').filter(Boolean);
                var slug = pathParts.length > 1 && pathParts[0] === 'product' ? pathParts[pathParts.length - 1] : null;

                if (!slug) return;
                
                var endpoint = "https://firestore.googleapis.com/v1/projects/" + PROJECT_ID + "/databases/(default)/documents:runQuery?key=" + API_KEY;
                var body = {
                    structuredQuery: {
                        from: [{ collectionId: 'products' }],
                        where: { fieldFilter: { field: { fieldPath: 'slug' }, op: 'EQUAL', value: { stringValue: slug } } },
                        limit: 1
                    }
                };
                fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
                    .then(function(r){ return r.json(); })
                    .then(function(rows){
                        var doc = Array.isArray(rows) ? rows.find(function(x){ return x && x.document; })?.document : null;
                        if (!doc || !doc.fields) return;
                        var fields = doc.fields;
                        var title = (fields.seoTitle && fields.seoTitle.stringValue) || (fields.title && fields.title.stringValue) || '';
                        var description = (fields.metaDescription && fields.metaDescription.stringValue) || (fields.description && fields.description.stringValue) || '';
                        var images = (fields.images && fields.images.arrayValue && fields.images.arrayValue.values ? fields.images.arrayValue.values : [])
                            .map(function(v){ return v.stringValue; })
                            .filter(function(u){ return u && !/(?:youtube\.com|youtu\.be)/i.test(u); });
                        
                        var normalizedUrl = "https://minankari.art/product/" + slug + "/";

                        if (title) { document.title = title + ' | Nino Kartsivadze'; }
                        var md = document.querySelector('meta[name="description"]'); if (md) { md.setAttribute('content', description.substring(0, 160)); }
                        var canonical = document.querySelector('link[rel="canonical"]');
                        if (!canonical) { canonical = document.createElement('link'); canonical.rel = 'canonical'; document.head.appendChild(canonical); }
                        canonical.setAttribute('href', normalizedUrl);
                        var ogTitle = document.querySelector('meta[property="og:title"]'); if (ogTitle) { ogTitle.setAttribute('content', title || ''); }
                        var ogDesc = document.querySelector('meta[property="og:description"]'); if (ogDesc) { ogDesc.setAttribute('content', description.substring(0, 160)); }
                        var ogUrl = document.querySelector('meta[property="og:url"]'); if (ogUrl) { ogUrl.setAttribute('content', normalizedUrl); }
                        var ogImage = document.querySelector('meta[property="og:image"]'); if (ogImage && images[0]) { ogImage.setAttribute('content', images[0]); }
                    })
                    .catch(function(){});
            } catch(e) {}
        })();
    </script>
    
    <style>
        :root { --primary: #D4AF37; --primary-dark: #9B7C2E; --bg: #121212; --glass: rgba(255, 255, 255, 0.05); --shadow-dark: rgba(0, 0, 0, 0.2); --shadow-light: rgba(255, 255, 255, 0.05); --text-light: rgba(255, 255, 255, 0.9); --bg-dark: #080808; --border-color: rgba(212, 175, 55, 0.2); } 
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; } 
        body { background: var(--bg); color: var(--text-light); min-height: 100vh; position: relative; } 
        #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: 2; pointer-events: none; } 
        
        /* Unified Container Styles */
        .product-page-container { max-width: 1300px; margin: 2rem auto; padding: 2rem; background: var(--glass); border-radius: 32px; box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light); backdrop-filter: blur(12px); border: 1px solid var(--border-color); position: relative; z-index: 1; display: none; opacity: 0; transition: opacity 0.5s; }
        .product-page-container.loaded { opacity: 1; display: block; }
        
        .product-body { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: start; }
        .desktop-col-left, .desktop-col-right { display: flex; flex-direction: column; gap: 1.5rem; }
        
        .slideshow-container { width: 100%; min-height: 300px; position: relative; border-radius: 16px; overflow: hidden; box-shadow: 4px 4px 8px var(--shadow-dark); -webkit-mask-image: -webkit-radial-gradient(white, black); aspect-ratio: 1/1; background: var(--bg-dark); }
        .slideshow-item { width: 100%; height: 100%; object-fit: contain; position: absolute; top: 0; left: 0; opacity: 0; transition: opacity 1.2s ease-in-out; pointer-events: none; }
        .slideshow-item.active { opacity: 1; }
        .slideshow-item-video { width: 140%; height: 140%; top: -20%; left: -20%; position: absolute; }
        .slideshow-item-video iframe { width: 100%; height: 100%; border: none; }
        .slideshow-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; cursor: grab; }
        
        .product-header-block { border-bottom: 1px solid var(--border-color); padding-bottom: 1.5rem; }
        .product-title { font-size: clamp(1.8rem, 4vw, 2.8rem); color: var(--primary); font-weight: 300; line-height: 1.2; text-align: left; }
        .product-price { font-size: 2.5rem; color: var(--primary); font-weight: 400; margin: 0.5rem 0 0 0; }
        
        .info-header-static, .mobile-tabs-nav { margin: 1rem 0; border-bottom: 1px solid var(--border-color); display: flex; gap: 1rem; }
        .mobile-tabs-nav { display: none; }
        .tab-label-static, .tab-button { background: none; border: none; color: var(--primary); padding: 0.75rem 0.25rem; font-size: 1rem; font-weight: 500; border-bottom: 2px solid var(--primary); margin-bottom: -1px; opacity: 1; }
        .tab-button { cursor: pointer; color: var(--text-light); border-bottom-color: transparent; opacity: 0.6; }
        .tab-button.active { opacity: 1; color: var(--primary); border-bottom-color: var(--primary); }
        
        .product-description { line-height: 1.7; color: rgba(255, 255, 255, 0.85); font-size: 1rem; }
        .product-description p { margin-bottom: 1em; }
        .product-description h2 { font-size: 1.5rem; color: var(--primary); margin: 1.5rem 0 1rem 0; font-weight: 400; }
        .product-description h3 { font-size: 1.2rem; color: var(--text-light); margin: 1.2rem 0 0.8rem 0; font-weight: 500; }
        
        .product-features { list-style-type: none; padding-left: 0; }
        .product-features li { padding: 0.5rem 0; position: relative; padding-left: 1.5rem; }
        .product-features li::before { content: '✦'; position: absolute; left: 0; color: var(--primary); }
        
        .action-button { width: auto; min-width: 200px; padding: 1rem; border: none; border-radius: 50px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: all 0.3s; text-decoration: none; text-align: center; display: block; background: var(--primary); color: var(--bg-dark); box-shadow: 4px 4px 8px var(--shadow-dark); }
        .action-button:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .back-link { display: inline-block; margin-top: 2rem; color: var(--primary); text-decoration: none; text-align: center; width: 100%; }
        
        .related-products-container { max-width: 1100px; margin: 2rem auto; padding: 2rem; background: var(--glass); border-radius: 24px; display: none; border: 1px solid var(--border-color); }
        .related-products-container.loaded { display: block; }
        .related-products-title { font-size: 2rem; color: var(--primary); font-weight: 300; text-align: center; margin-bottom: 2rem; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
        .product-card { background: var(--glass); border-radius: 24px; border: 1px solid var(--border-color); overflow: hidden; color: var(--text-light); text-decoration: none; display: flex; flex-direction: column; }
        .product-card .slideshow-container { height: 250px; aspect-ratio: unset; margin: 0; clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%); transition: clip-path 0.5s ease; }
        .product-card:hover .slideshow-container { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 85%); }
        .product-card .product-info { padding: 1.5rem; display: flex; flex-direction: column; }
        .product-card .product-title { color: var(--primary); font-size: 1.2rem; margin-bottom: 0.5rem; }
        .product-card .product-price { font-weight: 700; margin-bottom: 1rem; }
        .gold-button { display: inline-block; text-align: center; color: var(--primary); padding: 0.8rem 1.5rem; border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 50px; }

        @media (max-width: 768px) {
            .product-page-container { padding: 1rem; margin: 1rem; }
            .product-body { display: flex; flex-direction: column; gap: 1.5rem; }
            .desktop-col-left, .desktop-col-right { display: contents; }
            
            .slideshow-container { order: 1; }
            .product-header-block { order: 2; }
            .mobile-tabs-nav { order: 3; display: flex; }
            #desc-container { order: 4; }
            #details-container { order: 4; }
            .product-actions { order: 5; margin-top: 1rem; }
            
            .info-header-static { display: none; }
            .content-block { display: none; margin-top: 1rem; }
            .content-block.active-tab { display: block; }
            .action-button { width: 100%; }
        }
    </style>
</head>
<body>
    
    <script type="application/ld+json" id="product-schema-json">{}</script>
    
    <div id="particles-js"></div>
    <div id="message-container" class="message-container" style="text-align: center; font-size: 1.5rem; padding: 5rem 1rem; color: #D4AF37;">Loading masterpiece...</div>
    
    <div id="page-content-wrapper"></div>

    <script src="https://www.youtube.com/iframe_api" async defer></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        function isYoutubeUrl(url) { return /^(https?:\/\/)?(www\.)?(youtube\.com|youtu\.?be)\/.+$/.test(url); }

        function updateMetaTags(product, allCategories) {
            const pageUrl = `https://minankari.art/product/${product.slug}/`;
            const seoTitle = product.seoTitle || product.title;
            const metaDescription = product.metaDescription || (product.description ? product.description.substring(0, 160).replace(/\n/g, ' ') : 'Handmade jewelry by Nino Kartsivadze');
            const imageList = product.images ? product.images.filter(url => !isYoutubeUrl(url)) : [];
            const firstImage = imageList.length > 0 ? imageList[0] : 'https://minankari.art/placeholder.jpg';

            document.title = `${seoTitle} | Nino Kartsivadze`;
            document.querySelector('meta[name="description"]').setAttribute('content', metaDescription);
            
            let canonicalLink = document.querySelector('link[rel="canonical"]');
            if (!canonicalLink) {
                canonicalLink = document.createElement('link');
                canonicalLink.rel = 'canonical';
                document.head.appendChild(canonicalLink);
            }
            canonicalLink.setAttribute('href', pageUrl);

            document.querySelector('meta[property="og:title"]').setAttribute('content', seoTitle);
            document.querySelector('meta[property="og:description"]').setAttribute('content', metaDescription);
            document.querySelector('meta[property="og:url"]').setAttribute('content', pageUrl);
            document.querySelector('meta[property="og:image"]').setAttribute('content', firstImage);

            const schemaScript = document.getElementById('product-schema-json');
            if (schemaScript) {
                const priceValue = product.price ? parseFloat(String(product.price).replace(/[^0-9.]/g, '')) : NaN;
                
                const productSchema = {
                    "@type": "Product", 
                    "name": product.title, 
                    "description": metaDescription, 
                    "sku": product.slug, 
                    "image": imageList, 
                    "brand": { "@type": "Person", "name": "Nino Kartsivadze" }, 
                    "url": pageUrl
                };
                if (!isNaN(priceValue) && priceValue > 0) {
                    productSchema.offers = { "@type": "Offer", "url": pageUrl, "priceCurrency": "USD", "price": priceValue.toFixed(2), "availability": "https://schema.org/InStock", "itemCondition": "https://schema.org/NewCondition" };
                }

                const breadcrumbList = [
                    { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://minankari.art/" }
                ];
                let currentPos = 2;
                
                const categoryInfo = allCategories[product.category];
                if (categoryInfo && categoryInfo.parent === 'cast') {
                    breadcrumbList.push({ "@type": "ListItem", "position": currentPos, "name": "Cast Collection", "item": "https://minankari.art/cast" });
                    currentPos++;
                }
                
                breadcrumbList.push({ "@type": "ListItem", "position": currentPos, "name": product.title, "item": pageUrl });

                const breadcrumbSchema = {
                    "@context": "https://schema.org",
                    "@type": "BreadcrumbList",
                    "itemListElement": breadcrumbList
                };

                schemaScript.textContent = JSON.stringify([productSchema, breadcrumbSchema], null, 2);
            }
        }

        function buildPage(product, allCategories, db) {
            updateMetaTags(product, allCategories);
            
            const productCategory = allCategories[product.category];
            const parentPage = productCategory && productCategory.parent === 'cast' ? '/cast' : '/';

            const formattedDescription = product.description.split('\n').filter(p => p.trim() !== '').map(p => `<p>${p}</p>`).join('');
            const featuresHTML = product.features?.map(f => `<li>${f}</li>`).join('') || '';
            const mediaHTML = (product.images || []).map(mediaUrl => createMediaElement(mediaUrl, product.title)?.outerHTML || '').join('');
            
            const whatsappNumber = '995593221687';
            const productPageUrl = `https://minankari.art/product/${product.slug}/`;
            const message = `Hello! I am interested in your product.\n\n${productPageUrl}`;
            const orderLink = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;

            const pageHTML = `
                <div class="product-page-container" id="product-content">
                    <div class="product-body">
                        
                        <div class="desktop-col-left">
                            <div class="slideshow-container">${mediaHTML}</div>
                            
                            <div id="details-container">
                                <div class="info-header-static"><span class="tab-label-static">Details</span></div>
                                <div id="content-details" class="content-block active-tab">
                                    <ul class="product-features">${featuresHTML}</ul>
                                </div>
                            </div>
                        </div>

                        <div class="desktop-col-right">
                            <div class="product-header-block">
                                <h1 class="product-title">${product.title}</h1>
                                <p class="product-price">${product.price}</p>
                            </div>

                            <div class="mobile-tabs-nav">
                                <button class="tab-button active" data-target="desc">Description</button>
                                <button class="tab-button" data-target="details">Details</button>
                            </div>

                            <div id="desc-container">
                                <div class="info-header-static"><span class="tab-label-static">Description</span></div>
                                <div id="content-desc" class="content-block active-tab">
                                    <div class="product-description">${formattedDescription}</div>
                                </div>
                            </div>

                            <div class="product-actions">
                                <a href="${orderLink}" class="action-button" id="order-now-button" target="_blank" rel="noopener noreferrer">ORDER NOW</a>
                            </div>
                        </div>

                    </div>
                    <a href="${parentPage}" class="back-link">← Back to Collection</a>
                </div>
                <div class="related-products-container" id="related-products">
                    <h2 class="related-products-title">You might also like</h2>
                    <div class="products-grid" id="related-products-grid"></div>
                </div>
            `;

            document.getElementById('page-content-wrapper').innerHTML = pageHTML;
            document.getElementById('message-container').style.display = 'none';

            const productContentEl = document.getElementById('product-content');
            setTimeout(() => productContentEl.classList.add('loaded'), 50);

            setupSlideshow(productContentEl.querySelector('.slideshow-container'));
            setupMobileTabs(productContentEl); // Initialize tabs logic

            if (product.category) {
                loadRelatedProducts(db, product.category, product.id);
            }
        }

        function setupMobileTabs(container) {
            const btns = container.querySelectorAll('.mobile-tabs-nav .tab-button');
            const contentDesc = container.querySelector('#content-desc');
            const contentDetails = container.querySelector('#content-details');
            
            if (window.innerWidth <= 768) {
                 contentDesc.classList.add('active-tab');
                 contentDetails.classList.remove('active-tab');
            }

            btns.forEach(btn => {
                btn.addEventListener('click', () => {
                    btns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const target = btn.dataset.target; 
                    if (target === 'desc') {
                        contentDesc.classList.add('active-tab');
                        contentDetails.classList.remove('active-tab');
                    } else {
                        contentDesc.classList.remove('active-tab');
                        contentDetails.classList.add('active-tab');
                    }
                });
            });
            
            window.addEventListener('resize', () => {
                if (window.innerWidth > 768) {
                    contentDesc.classList.add('active-tab');
                    contentDetails.classList.add('active-tab');
                } else {
                    const activeBtn = container.querySelector('.mobile-tabs-nav .tab-button.active');
                    if (activeBtn) activeBtn.click();
                }
            });
        }

        function getYoutubeEmbedUrl(url) { let videoId; try { const urlObj = new URL(url); videoId = (urlObj.hostname === 'youtu.be') ? urlObj.pathname.slice(1) : urlObj.searchParams.get('v'); } catch(e) { return null; } return videoId ? `https://www.youtube.com/embed/${videoId}?enablejsapi=1&autoplay=1&mute=1&controls=0&loop=1&playlist=${videoId}&origin=${window.location.origin}` : null; }
        function createMediaElement(mediaUrl, productTitle) { if (isYoutubeUrl(mediaUrl)) { const embedUrl = getYoutubeEmbedUrl(mediaUrl); if (!embedUrl) return null; const wrapper = document.createElement('div'); wrapper.className = 'slideshow-item slideshow-item-video'; const iframe = document.createElement('iframe'); iframe.src = embedUrl; iframe.title = productTitle + ' - YouTube Video'; wrapper.appendChild(iframe); return wrapper; } else { const img = document.createElement('img'); img.src = mediaUrl; img.alt = productTitle + ' - handmade cloisonne enamel'; img.className = 'slideshow-item'; img.loading = 'lazy'; return img; } }
        function setupSlideshow(container) { if (!container) return; const slides = Array.from(container.querySelectorAll('.slideshow-item, .slideshow-item-video')); if (slides.length <= 1) { if (slides.length === 1) slides[0].classList.add('active'); return; } const overlay = document.createElement('div'); overlay.className = 'slideshow-overlay'; container.appendChild(overlay); let currentIndex = 0; let intervalId; function showSlide(index) { const oldSlide = slides[currentIndex]; if (oldSlide) oldSlide.classList.remove('active'); currentIndex = (index + slides.length) % slides.length; const newSlide = slides[currentIndex]; if (newSlide) setTimeout(() => newSlide.classList.add('active'), 1200); } function startAutoplay() { clearInterval(intervalId); intervalId = setInterval(() => showSlide(currentIndex + 1), 5000); } function manualSlide(direction) { clearInterval(intervalId); showSlide(currentIndex + direction); startAutoplay(); } let touchStartX = 0; overlay.addEventListener('mousedown', e => { touchStartX = e.clientX; clearInterval(intervalId); }); overlay.addEventListener('mouseup', e => { if (e.clientX < touchStartX - 50) manualSlide(1); else if (e.clientX > touchStartX + 50) manualSlide(-1); startAutoplay(); }); overlay.addEventListener('mouseleave', startAutoplay); showSlide(0); startAutoplay(); }
        
        async function loadRelatedProducts(db, category, currentProductId) { 
            const relatedContainer = document.getElementById('related-products'); 
            const grid = document.getElementById('related-products-grid'); 
            if (!grid) return; 
            const snapshot = await db.collection('products').where('category', '==', category).limit(4).get(); 
            const relatedProducts = []; 
            snapshot.forEach(doc => { if (doc.id !== currentProductId) { relatedProducts.push(doc.data()); } }); 
            if (relatedProducts.length === 0) return; 
            relatedContainer.style.display = 'block'; 
            setTimeout(() => relatedContainer.classList.add('loaded'), 50); 
            relatedProducts.slice(0, 3).forEach(product => { 
                const productCard = document.createElement('a'); 
                productCard.href = `/product/${product.slug}/`; 
                productCard.className = 'product-card'; 
                const slideshowHTML = `<div class="slideshow-container">${(product.images || []).map(mediaUrl => createMediaElement(mediaUrl, product.title)?.outerHTML || '').join('')}</div>`; 
                const productInfoHTML = `<div class="product-info"><h3 class="product-title">${product.title}</h3><p class="product-price">${product.price}</p><div class="gold-button">VIEW DETAILS</div></div>`; 
                productCard.innerHTML = slideshowHTML + productInfoHTML; 
                grid.appendChild(productCard); 
                setupSlideshow(productCard.querySelector('.slideshow-container')); 
            }); 
        }
        
        async function initializeProductPage() {
            const firebaseConfig = { apiKey: "AIzaSyAxOUOxaufE60eVuyOq_P66MJ9ls_7p470", authDomain: "nini-shop-7c89d.firebaseapp.com", projectId: "nini-shop-7c89d", storageBucket: "nini-shop-7c89d.appspot.com", messagingSenderId: "595482257713", appId: "1:595482257713:web:3e3d3bf75f03c08e58a810", measurementId: "G-0HX4N09DYT" };
            if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
            const db = firebase.firestore();
            const particleConfig = { "particles": { "number": { "value": 80, "density": { "enable": true, "value_area": 800 }}, "color": { "value": "#D4AF37" }, "shape": { "type": "circle" }, "opacity": { "value": 0.5, "random": true, "anim": { "enable": true, "speed": 1, "opacity_min": 0.1 }}, "size": { "value": 3, "random": true, "anim": { "enable": true, "speed": 2, "size_min": 0.1 }}, "line_linked": { "enable": true, "distance": 150, "color": "#D4AF37", "opacity": 0.2, "width": 1 }, "move": { "enable": true, "speed": 1, "direction": "none", "random": true, "out_mode": "out" }}, "interactivity": { "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" }}}, "retina_detect": true };
            if (document.getElementById('particles-js')) { particlesJS('particles-js', particleConfig); }
            
            const messageContainer = document.getElementById('message-container');
            const pathParts = window.location.pathname.split('/').filter(p => p);
            const productSlug = pathParts.length > 1 && pathParts[0] === 'product' ? pathParts[pathParts.length - 1] : null;

            if (!productSlug) { messageContainer.textContent = 'Error: Product not specified.'; return; }
            try {
                const [productSnapshot, categoriesSnapshot] = await Promise.all([
                    db.collection('products').where('slug', '==', productSlug).limit(1).get(),
                    db.collection('categories').get()
                ]);

                if (productSnapshot.empty) { messageContainer.textContent = 'Sorry, this product could not be found.'; return; }
                
                const productData = { id: productSnapshot.docs[0].id, ...productSnapshot.docs[0].data() };
                
                const allCategories = {};
                categoriesSnapshot.forEach(doc => { allCategories[doc.id] = doc.data(); });

                buildPage(productData, allCategories, db);
            } catch (error) { console.error("Critical error loading product:", error); messageContainer.textContent = 'An error occurred while loading product data.'; }
        }
        initializeProductPage();
    </script>
</body>
</html>
